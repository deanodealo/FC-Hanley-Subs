  <!-- Animated burger styles -->
  <style>
    #burger-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 30px;
      height: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      z-index: 2000;
    }
    #burger-toggle span {
      display: block;
      height: 3px;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    #burger-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    #burger-toggle.open span:nth-child(2) { opacity: 0; }
    #burger-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .burger-dropdown {
      position: fixed !important;
      top: var(--header-height, 90px) !important;
      left: 0 !important;
      z-index: 1900 !important;
      transform: translateX(-100%) !important;
      transition: transform 0.3s ease !important;
    }
    .burger-dropdown.open { transform: translateX(0) !important; }
  </style>

<!-- Burger Menu JS -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const burgerToggle = document.getElementById("burger-toggle");
    const burgerDropdown = document.getElementById("burger-dropdown");
    const overlay = document.getElementById("burger-overlay");
    const header = document.querySelector(".club-header");

    function setHeaderHeight() {
      const textBlock = document.querySelector(".header-text");
      const bottom = (textBlock || header).getBoundingClientRect().bottom;
      document.documentElement.style.setProperty("--header-height", bottom + "px");
    }
    setHeaderHeight();
    window.addEventListener("resize", setHeaderHeight);

    function openMenu() {
      burgerDropdown.classList.add("open");
      overlay.classList.add("show");
      burgerToggle.classList.add("open");
    }

    function closeMenu() {
      burgerDropdown.classList.remove("open");
      overlay.classList.remove("show");
      burgerToggle.classList.remove("open");
    }

    burgerToggle.addEventListener("click", () => {
      if (burgerDropdown.classList.contains("open")) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    overlay.addEventListener("click", closeMenu);

    burgerDropdown.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", closeMenu);
    });
  });
</script>

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to load news from Firebase DB and update the page
    function loadNews() {
      const newsRef = db.ref('adminContent/news');

      newsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const newsList = document.getElementById('newsList');
        newsList.innerHTML = ''; // Clear previous content

        if (!data || !data.textContent) {
          newsList.innerHTML = '<p>No news available right now.</p>';
          return;
        }

        // Safely inject text content
        const p = document.createElement('p');
        p.textContent = data.textContent;
        p.classList.add('news-item'); // Add styling class
        newsList.appendChild(p);
      });
    }

    // Load news once page is fully loaded
    window.onload = loadNews;
  </script>

<script>
  let timeoutId;

  window.addEventListener('scroll', () => {
    const progressBar = document.getElementById('scroll-progress-bar');
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrolled = (scrollTop / docHeight) * 100;

    progressBar.style.width = `${scrolled}%`;
    progressBar.style.opacity = '1';

    clearTimeout(timeoutId);
    timeoutId = setTimeout(() => {
      progressBar.style.opacity = '0';
    }, 1500); // fade out 1.5s after user stops scrolling
  });
</script>
