<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FC Hanley Tournament Admin</title>

  <link rel="stylesheet" href="styles/styles.css" />
  <link rel="stylesheet" href="styles/admin-registrations.css" />
  <link rel="icon" href="images/hanleybadge2.png" type="image/png" sizes="48x48" />

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body class="page-about">

  <header class="club-header">
    <a href="index.html">
      <img src="images/HanleyBadge.png" alt="FC Hanley Badge" class="badge overlapping-logo">
    </a>
    <div class="header-text">
      <h1>FC Hanley Admin</h1>
      <p>Tournament Registrations</p>
    </div>
  </header>

  <main class="admin-page">
    <section class="admin-card">
      <h1>Tournament Registrations</h1>

      <div class="admin-actions">
        <button id="refreshBtn">Refresh</button>
        <button id="exportCsvBtn">Export CSV</button>
      </div>

      <div class="summary-grid">
        <div class="summary-box">
          <h2 id="totalTeams">0</h2>
          <p>Total Teams</p>
        </div>

        <div class="summary-box">
          <h2 id="totalIncome">£0</h2>
          <p>Total Income</p>
        </div>
      </div>

      <div class="filter-row">
        <label for="ageFilter">Filter by age group</label>
        <select id="ageFilter">
          <option value="all">All age groups</option>
          <option value="U7">U7</option>
          <option value="U8">U8</option>
          <option value="U9">U9</option>
          <option value="U10">U10</option>
          <option value="U11">U11</option>
          <option value="U12">U12</option>
          <option value="U13">U13</option>
        </select>
      </div>

      <h2>Age Group Breakdown</h2>
      <div id="ageBreakdown" class="age-breakdown"></div>

      <h2>Registered Teams</h2>
      <div id="registrationsList" class="registrations-list">
        Loading registrations...
      </div>
    </section>
  </main>

  <script src="admin-registrations.js"></script>
</body>
</html>
