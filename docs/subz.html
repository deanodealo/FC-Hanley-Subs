<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Substitution Planner - FC Hanley</title>
  <link rel="stylesheet" href="styles/styles.css"/>
  <style>
    .step-slide {
      display: none;
      transform: translateX(100%);
      opacity: 0;
      transition: all 0.5s ease;
      position: absolute;
      width: 100%;
    }

    .step-slide.active {
      display: block;
      transform: translateX(0%);
      opacity: 1;
      position: relative;
    }

    .form-slider {
      position: relative;
      overflow: hidden;
      min-height: 450px;
    }

    .form-buttons {
      margin-top: 1rem;
      display: flex;
      justify-content: space-between;
    }

    @media (max-width: 600px) {
      .form-slider {
        min-height: 500px;
      }
    }
  </style>
  <link rel="canonical" href="https://fchanley.com/subz.html" />

  <!-- Animated burger styles -->
  <style>
    #burger-toggle {
      position: fixed;
      top: 1rem;
      left: 1rem;
      width: 30px;
      height: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      z-index: 2000;
    }
    #burger-toggle span {
      display: block;
      height: 3px;
      width: 100%;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    #burger-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    #burger-toggle.open span:nth-child(2) { opacity: 0; }
    #burger-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .burger-dropdown {
      position: fixed !important;
      top: var(--header-height, 90px) !important;
      left: 0 !important;
      z-index: 1900 !important;
      transform: translateX(-100%) !important;
      transition: transform 0.3s ease !important;
    }
    .burger-dropdown.open { transform: translateX(0) !important; }
  </style>
</head>
<body>

<!-- Burger Menu Overlay -->
<div class="burger-overlay" id="burger-overlay"></div>

<!-- Burger toggle: fixed top-left, sits over the header -->
<button id="burger-toggle" aria-label="Toggle menu">
  <span></span>
  <span></span>
  <span></span>
</button>

<!--Header-->
<header class="club-header">
  <a href="index.html">
    <img src="images/HanleyBadge.png" alt="FC Hanley Badge" class="badge overlapping-logo">
  </a>
  <div class="header-text">
    <h1>FC Hanley Football Club</h1>
    <p>Passion. Pride. Community.</p>
  </div>
</header>

<!-- Dropdown: slides in from left, below the header -->
<div id="burger-dropdown" class="burger-dropdown">
  <a href="gallery.html">Coaching School</a>
  <a href="news.html">News & Events</a>
  <a href="holidaycamps.html">Holiday Camps</a>
  <a href="fixtures.html">Fixtures</a>
  <a href="toptier.html">Top Tier Trophies</a>
  <a href="guestbook.html">Feedback</a>
  <a href="shop.html">Shop</a>
  <a href="subz.html">Subz</a>
  <a href="vacancies/playon/index.html">Find a Team</a>
  <!--<a href="https://deanodealo.github.io/FCHanleytournament/" target="_blank">🏆 Will Brazier Tournament</a>-->
  <!--<a href="tournament-registration.html">🏆Tournament Registration</a>-->
</div>


  <header class="hero">
    <div class="hero-content">
      <h1>Subz!</h1>
      <p>Plan your team substitutions with ease!</p>
    </div>
  </header>

  <div class="container">
    <div class="form-container">
      <h2>Substitution Planner</h2>
      <form id="subForm">

        <div class="form-slider">
          <!-- Step 1 -->
          <div class="step-slide active">
            <label for="total_players">Total Players:</label>
            <input type="number" id="total_players" min="1" value="12" />

            <label for="on_field">Players on Field:</label>
            <input type="number" id="on_field" min="1" value="11" />

            <label for="total_minutes">Total Game Time (minutes):</label>
            <input type="number" id="total_minutes" min="1" value="90" />

            <div class="form-buttons">
              <button type="button" onclick="nextStep()">Next</button>
            </div>
          </div>

          <!-- Step 2 -->
          <div class="step-slide">
            <label for="sub_interval">Substitution Interval (minutes):</label>
            <input type="number" id="sub_interval" min="0.1" value="10" step="0.1" />

            <label for="use_custom_names">Use Custom Player Names:</label>
            <input type="checkbox" id="use_custom_names" />

            <div class="form-buttons">
              <button type="button" onclick="prevStep()">Back</button>
              <button type="button" onclick="nextStep()">Next</button>
            </div>
          </div>

          <!-- Step 3 -->
          <div class="step-slide">
            <div id="player_names"></div>

            <label for="goalkeeper_name">Goalkeeper:</label>
            <select id="goalkeeper_name"></select>

            <label for="excluded_player">Exclude From Starting Lineup:</label>
            <select id="excluded_player">
              <option value="None">None</option>
            </select>

            <div class="form-buttons">
              <button type="button" onclick="prevStep()">Back</button>
              <button type="submit">Generate Plan</button>
            </div>
          </div>
        </div>
      </form>
    </div>

    <div id="substitutionResults" class="results-container">
      <h2>Substitution Plan</h2>
      <div id="planOutput"></div>
      <button onclick="clearPlan()">Clear Plan</button>
    </div>
  </div>

  <script src="scripts/substitution.js"></script>
  <script src="subz.js"></script>
  <script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step-slide");

    function showStep(index) {
      steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === index) step.classList.add("active");
      });
      currentStep = index;
    }

    function nextStep() {
      if (currentStep < steps.length - 1) {
        showStep(currentStep + 1);
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        showStep(currentStep - 1);
      }
    }
  </script>

<!-- Burger Menu JS -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const burgerToggle = document.getElementById("burger-toggle");
    const burgerDropdown = document.getElementById("burger-dropdown");
    const overlay = document.getElementById("burger-overlay");
    const header = document.querySelector(".club-header");

    function setHeaderHeight() {
      const textBlock = document.querySelector(".header-text");
      const bottom = (textBlock || header).getBoundingClientRect().bottom;
      document.documentElement.style.setProperty("--header-height", bottom + "px");
    }
    setHeaderHeight();
    window.addEventListener("resize", setHeaderHeight);

    function openMenu() {
      burgerDropdown.classList.add("open");
      overlay.classList.add("show");
      burgerToggle.classList.add("open");
    }

    function closeMenu() {
      burgerDropdown.classList.remove("open");
      overlay.classList.remove("show");
      burgerToggle.classList.remove("open");
    }

    burgerToggle.addEventListener("click", () => {
      if (burgerDropdown.classList.contains("open")) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    overlay.addEventListener("click", closeMenu);

    burgerDropdown.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", closeMenu);
    });
  });
</script>

</body>
</html>
