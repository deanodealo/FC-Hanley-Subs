<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FC Hanley Booking Admin</title>
  <link rel="stylesheet" href="bookingadmin.css" />
</head>
<body class="booking-admin">

  <!-- Login Section -->
  <div id="loginSection" class="login-section">
    <h2>Login to Access Booking Admin</h2>
    <input type="email" id="emailInput" placeholder="Enter Email" />
    <input type="password" id="passwordInput" placeholder="Enter Password" />
    <button id="loginButton">Login</button>
    <p id="errorMessage" style="color:red; display:none;">Incorrect email or password. Please try again.</p>
  </div>

  <!-- Booking Admin Section (Initially Hidden) -->
  <div id="adminSection" class="admin-container" style="display: none;">
    <header class="admin-header">
      <img src="images/HanleyBadge.png" alt="FC Hanley Badge" class="badge" />
      <h1>FC Hanley Booking Admin</h1>
      <p>View bookings, child numbers, and totals</p>
    </header>

    <!-- Dashboard content (you can customize this section as per your needs) -->
    <section class="dashboard">
      <div class="stat-card">
        <div class="stat-label">Total Bookings</div>
        <div class="stat-value" id="totalBookings">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Total Children</div>
        <div class="stat-value" id="totalChildren">0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Total Income</div>
        <div class="stat-value" id="totalIncome">£0</div>
      </div>
    </section>

    <section class="filters">
      <input type="text" id="searchInput" placeholder="Search by parent or child name" />
      <select id="dayFilter">
        <!-- Dynamic options will be inserted here -->
      </select>
    </section>

    <section class="bookings-section">
      <h2>Bookings</h2>
      <div id="bookingsList" class="bookings-list"></div>
      <div id="noBookingsMessage" class="no-bookings" style="display:none;">
        No bookings found.
      </div>
    </section>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="camp-config.js"></script>
  <script src="bookingadmin.js"></script>

</body>
</html>
